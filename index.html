<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HealthQ</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Urbanist:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
/* ── Themes ── */
[data-theme="dark"]{
  --bg:#04060f;
  --lime:#b9ff66;
  --blue:#4facfe;
  --purple:#a78bfa;
  --white:#f5f9ff;
  --card-bg:rgba(4,8,22,0.72);
  --nav-bg:rgba(4,8,22,0.88);
  --footer-bg:rgba(4,8,22,0.97);
  --muted:#4a5568;
  --glass:rgba(255,255,255,0.04);
  --glass-b:rgba(255,255,255,0.08);
}
[data-theme="light"]{
  --bg:#f0f4ff;
  --lime:#2563eb;
  --blue:#0ea5e9;
  --purple:#7c3aed;
  --white:#0f172a;
  --card-bg:rgba(255,255,255,0.88);
  --nav-bg:rgba(255,255,255,0.92);
  --footer-bg:rgba(240,244,255,0.97);
  --muted:#94a3b8;
  --glass:rgba(0,0,0,0.03);
  --glass-b:rgba(0,0,0,0.07);
}
html,body{height:100%;overflow-x:hidden}
body{
  background:var(--bg);color:var(--white);
  font-family:'Urbanist',sans-serif;
  cursor:none;
  transition:background 0.4s,color 0.3s;
}

/* Cursor */
#cursor{position:fixed;width:7px;height:7px;border-radius:50%;background:var(--lime);pointer-events:none;z-index:10000;transform:translate(-50%,-50%);box-shadow:0 0 8px rgba(185,255,102,.9);transition:width .2s,height .2s}
#cursor.hover{width:11px;height:11px}
#cursor-ring{position:fixed;width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(185,255,102,.45);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .35s cubic-bezier(.16,1,.3,1),height .35s,border-color .35s}
#cursor-ring.hover{width:50px;height:50px;border-color:rgba(185,255,102,.2)}
@media(hover:none),(pointer:coarse){#cursor,#cursor-ring{display:none!important}body{cursor:auto!important}}

/* 3D canvas */
#bg{position:fixed;inset:0;z-index:0;pointer-events:none}

/* Wordmark */
#wordmark{position:fixed;top:28px;left:32px;z-index:10;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3.5px;color:rgba(255,255,255,.22);pointer-events:none;}
[data-theme="light"] #wordmark{color:rgba(0,0,0,0.25);}

/* Theme button */
#themeBtn{position:fixed;top:22px;left:50%;transform:translateX(-50%);z-index:20;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:100px;padding:6px 16px;font-size:12px;font-weight:600;letter-spacing:1px;color:rgba(255,255,255,0.5);cursor:pointer;font-family:'Urbanist',sans-serif;transition:all 0.25s;backdrop-filter:blur(12px);display:flex;align-items:center;gap:7px;white-space:nowrap;}
#themeBtn:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);}
[data-theme="light"] #themeBtn{background:rgba(0,0,0,0.05);border-color:rgba(0,0,0,0.1);color:rgba(0,0,0,0.45);}
[data-theme="light"] #themeBtn:hover{background:rgba(0,0,0,0.09);color:rgba(0,0,0,0.7);}

/* Orb name label */
#orb-name{position:fixed;top:50%;left:50%;transform:translate(-50%,calc(-50% + 230px));z-index:6;text-align:center;pointer-events:none;transition:opacity 0.5s;}
#orb-name .oname{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:6px;color:rgba(185,255,102,0.55);text-shadow:0 0 24px rgba(185,255,102,0.25);}
#orb-name .otagline{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.18);margin-top:4px;}
[data-theme="light"] #orb-name .oname{color:rgba(37,99,235,0.65);text-shadow:0 0 20px rgba(37,99,235,0.2);}
[data-theme="light"] #orb-name .otagline{color:rgba(0,0,0,0.22);}

/* Theme button */
#themeBtn{position:fixed;top:22px;left:50%;transform:translateX(-50%);z-index:10;background:var(--glass);border:1px solid var(--glass-b);border-radius:100px;padding:6px 16px;font-size:12px;font-weight:600;letter-spacing:1px;color:var(--white);cursor:pointer;font-family:'Urbanist',sans-serif;transition:all 0.25s;backdrop-filter:blur(12px);display:flex;align-items:center;gap:7px;}
#themeBtn:hover{background:var(--glass-b);}
[data-theme="light"] #themeBtn{cursor:pointer}

/* Orb name */
#orb-name{position:fixed;top:50%;left:50%;transform:translate(-50%,calc(-50% + 220px));z-index:6;text-align:center;pointer-events:none;transition:opacity 0.5s;}
#orb-name .name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:5px;color:rgba(185,255,102,0.6);text-shadow:0 0 20px rgba(185,255,102,0.3);}
#orb-name .tagline{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.2);margin-top:3px;}
[data-theme="light"] #orb-name .name{color:rgba(37,99,235,0.7);text-shadow:0 0 20px rgba(37,99,235,0.2);}
[data-theme="light"] #orb-name .tagline{color:rgba(0,0,0,0.25);}

/* State label */
#state-label{position:fixed;top:28px;right:32px;z-index:10;display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,.22);transition:color .5s;pointer-events:none;}
#state-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.18);transition:background .5s,box-shadow .5s;}
#state-label.thinking{color:rgba(79,172,254,.7)}
#state-label.thinking #state-dot{background:#4facfe;box-shadow:0 0 10px rgba(79,172,254,.9);animation:sPulse .7s ease infinite}
#state-label.speaking{color:rgba(185,255,102,.8)}
#state-label.speaking #state-dot{background:var(--lime);box-shadow:0 0 12px rgba(185,255,102,1)}
@keyframes sPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.7);opacity:.5}}
.wv{display:flex;align-items:center;gap:2px;height:12px;margin-left:2px}
.wv span{display:block;width:2px;border-radius:2px;background:currentColor;height:3px}
#state-label.speaking .wv span:nth-child(1){animation:wvB .5s ease infinite 0s}
#state-label.speaking .wv span:nth-child(2){animation:wvB .5s ease infinite .08s}
#state-label.speaking .wv span:nth-child(3){animation:wvB .5s ease infinite .16s}
#state-label.speaking .wv span:nth-child(4){animation:wvB .5s ease infinite .24s}
#state-label.speaking .wv span:nth-child(5){animation:wvB .5s ease infinite .32s}
#state-label.thinking .wv span:nth-child(odd){height:7px}
#state-label.thinking .wv span:nth-child(even){height:4px}
@keyframes wvB{0%,100%{height:3px}50%{height:11px}}

/* Centre overlay */
#centre{position:fixed;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;padding:0 32px 120px;}

/* Idle hint */
#idle-hint{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.18);transition:opacity .6s;animation:idleFloat 3s ease-in-out infinite;text-align:center;}
[data-theme="light"] #idle-hint{color:rgba(0,0,0,0.22);}
@keyframes idleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* Answer card — sits right on top of the orb center */
#answer-card{
  max-width:520px;width:100%;
  background:var(--card-bg);
  border:1px solid rgba(185,255,102,.12);
  border-radius:24px;
  padding:24px 28px 20px;
  backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);
  box-shadow:0 0 80px rgba(185,255,102,.08),0 0 0 1px rgba(185,255,102,.04),0 24px 64px rgba(0,0,0,.55);
  opacity:0;
  transform:scale(.94);
  transition:opacity .5s cubic-bezier(.16,1,.3,1),transform .5s cubic-bezier(.16,1,.3,1);
  pointer-events:auto;
  max-height:50vh;overflow-y:auto;
  position:relative;
}
[data-theme="light"] #answer-card{
  border-color:rgba(37,99,235,0.15);
  box-shadow:0 0 60px rgba(37,99,235,.08),0 20px 60px rgba(0,0,0,.1);
}
#answer-card.visible{opacity:1;transform:scale(1)}
#answer-card::-webkit-scrollbar{width:3px}
#answer-card::-webkit-scrollbar-track{background:transparent}
#answer-card::-webkit-scrollbar-thumb{background:rgba(185,255,102,.2);border-radius:3px}
#answer-text{font-size:15px;font-weight:400;line-height:1.8;color:var(--white);opacity:0.9;}
.answer-footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.06);}
[data-theme="light"] .answer-footer{border-top-color:rgba(0,0,0,0.07);}
.src-tag{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.2);}
[data-theme="light"] .src-tag{color:rgba(0,0,0,0.25);}
#speakBtn{display:flex;align-items:center;gap:6px;background:none;border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:5px 12px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.3);cursor:pointer;font-family:'Urbanist',sans-serif;transition:all .2s;}
[data-theme="light"] #speakBtn{border-color:rgba(0,0,0,0.1);color:rgba(0,0,0,0.35);}
#speakBtn:hover{color:var(--white);border-color:rgba(255,255,255,.18)}
#speakBtn.on{color:var(--lime);border-color:rgba(185,255,102,.3);background:rgba(185,255,102,.05)}
.speak-bars{display:flex;align-items:center;gap:1.5px;height:10px}
.speak-bars b{display:block;width:2px;background:currentColor;border-radius:2px;height:3px}
#speakBtn.on .speak-bars b:nth-child(1){animation:sb .65s ease infinite 0s}
#speakBtn.on .speak-bars b:nth-child(2){animation:sb .65s ease infinite .15s}
#speakBtn.on .speak-bars b:nth-child(3){animation:sb .65s ease infinite .3s}
@keyframes sb{0%,100%{height:3px}50%{height:10px}}

/* Input bar */
#input-wrap{position:fixed;bottom:44px;left:50%;transform:translateX(-50%);z-index:10;width:min(640px,calc(100vw - 48px));}
.ig{position:relative;border-radius:20px;background:linear-gradient(135deg,rgba(185,255,102,.18),rgba(79,172,254,.1),rgba(167,139,250,.12));padding:1.5px;}
.ig::before{content:'';position:absolute;inset:-3px;border-radius:23px;background:linear-gradient(135deg,rgba(185,255,102,.1),rgba(79,172,254,.08),rgba(167,139,250,.08));filter:blur(14px);z-index:-1;opacity:0;transition:opacity .4s;}
.ig:focus-within::before{opacity:1}
.ii{display:flex;align-items:center;gap:8px;background:rgba(4,8,22,.92);border-radius:19px;padding:8px 8px 8px 22px;backdrop-filter:blur(24px);}
#qi{flex:1;background:none;border:none;outline:none;color:var(--white);font-family:'Urbanist',sans-serif;font-size:16px;font-weight:400;padding:13px 0;caret-color:var(--lime);}
#qi::placeholder{color:rgba(255,255,255,.2)}
#voiceBtn{width:48px;height:48px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.35);font-size:16px;cursor:none;display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0;}
#voiceBtn:hover{background:rgba(255,255,255,.09);color:var(--white);border-color:rgba(255,255,255,.18)}
#voiceBtn.listening{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.4);color:#f87171;animation:mRing 1.2s ease infinite}
@keyframes mRing{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.3)}60%{box-shadow:0 0 0 10px rgba(239,68,68,0)}}
#askBtn{background:var(--lime);color:#04060f;border:none;border-radius:14px;padding:13px 26px;font-family:'Urbanist',sans-serif;font-size:14px;font-weight:700;cursor:none;flex-shrink:0;letter-spacing:.5px;transition:all .25s;box-shadow:0 4px 24px rgba(185,255,102,.25);}
#askBtn:hover{background:#c9ff77;box-shadow:0 8px 32px rgba(185,255,102,.4);transform:translateY(-1px)}
#askBtn:active{transform:translateY(1px)}
#askBtn:disabled{opacity:.35;cursor:none;transform:none}
#langSelect{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:rgba(255,255,255,.55);font-family:'Urbanist',sans-serif;font-size:13px;font-weight:600;padding:0 12px;height:48px;outline:none;cursor:none;flex-shrink:0;transition:all .25s;appearance:none;text-align:center;}
#langSelect:hover{background:rgba(185,255,102,.08);border-color:rgba(185,255,102,.3);color:var(--lime)}
#langSelect option{background:#04060f;color:var(--white)}
#hint{text-align:center;font-size:11px;color:rgba(255,255,255,.14);margin-top:10px;letter-spacing:.5px;transition:color .3s;}
#hint.red{color:#f87171}

@media(max-width:768px){
  #answer-card{max-width:calc(100vw - 40px);padding:20px 20px 16px}
  #centre{padding:0 20px 120px}
  #orb-name{transform:translate(-50%,calc(-50% + 170px))}
}
@media(max-width:600px){
  body{cursor:auto}
  #cursor,#cursor-ring{display:none!important}
  #askBtn,#voiceBtn,#langSelect,#speakBtn,#themeBtn{cursor:pointer}
  .ii{padding:6px 6px 6px 16px;gap:6px}
  #qi{font-size:15px;padding:11px 0}
  #voiceBtn{width:42px;height:42px;font-size:13px}
  #askBtn{padding:11px 16px;font-size:13px}
  #langSelect{height:42px;font-size:12px;padding:0 8px}
  #answer-card{padding:18px 16px 14px;max-height:40vh;max-width:calc(100vw - 32px)}
  #answer-text{font-size:14px}
  #centre{padding:0 16px 120px}
  #input-wrap{bottom:20px;width:calc(100vw - 32px)}
  #wordmark{top:18px;left:16px;font-size:16px;letter-spacing:2px}
  #state-label{top:20px;right:16px;font-size:10px}
  #themeBtn{top:18px;font-size:11px;padding:5px 12px}
  #orb-name{transform:translate(-50%,calc(-50% + 150px))}
  #orb-name .name{font-size:15px;letter-spacing:4px}
}
@media(max-width:380px){
  #answer-card{padding:14px 13px 12px}
  #answer-text{font-size:13px;line-height:1.7}
  #askBtn{padding:10px 12px;font-size:12px}
}
/* ══════════════════════════════
   FOOTER
══════════════════════════════ */
.site-footer{
  position:fixed;bottom:0;left:0;right:0;
  z-index:1;
  pointer-events:none;
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 28px 12px;
}
.footer-left,.footer-right{
  font-size:10px;letter-spacing:0.8px;
  color:rgba(255,255,255,0.1);
  font-weight:400;
  pointer-events:auto;
}
[data-theme="light"] .footer-left,[data-theme="light"] .footer-right{color:rgba(0,0,0,0.15);}
.footer-left a,.footer-right a{
  color:rgba(185,255,102,0.35);text-decoration:none;
  transition:color 0.2s;
}
[data-theme="light"] .footer-left a,[data-theme="light"] .footer-right a{color:rgba(37,99,235,0.4);}
.footer-left a:hover,.footer-right a:hover{color:rgba(185,255,102,0.7);}
[data-theme="light"] .footer-left a:hover,[data-theme="light"] .footer-right a:hover{color:rgba(37,99,235,0.8);}

@media(max-width:768px) and (orientation:landscape){
  #centre{padding:0 20px 100px}
  #answer-card{max-height:35vh}
  #orb-name{transform:translate(-50%,calc(-50% + 130px))}
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<canvas id="bg"></canvas>

<div id="wordmark">HEALTHQ</div>

<button id="themeBtn" onclick="toggleTheme()">🌙 Dark</button>

<div id="orb-name">
  <div class="oname">ARIA</div>
  <div class="otagline">AI Health Assistant</div>
</div>

<div id="state-label">
  <div id="state-dot"></div>
  <div class="wv"><span></span><span></span><span></span><span></span><span></span></div>
  <span id="state-text">Idle</span>
</div>

<div id="centre">
  <div id="idle-hint">Ask me anything about your health</div>
  <div id="answer-card">
    <div id="answer-text"></div>
    <div class="answer-footer">
      <span class="src-tag" id="src-tag">HealthQ · AI</span>
      <button id="speakBtn" onclick="toggleSpeak()">
        <div class="speak-bars"><b></b><b></b><b></b></div>
        Read aloud
      </button>
    </div>
  </div>
</div>

<div id="input-wrap">
  <div class="ig">
    <div class="ii">
      <input id="qi" type="text" placeholder="Ask a health question…" autocomplete="off"/>
      <button id="voiceBtn" title="Voice input">🎤</button>
      <select id="langSelect" title="Language" onchange="onLangChange()">
        <option value="en">🇬🇧 EN</option>
        <option value="hi">🇮🇳 HI</option>
      </select>
      <button id="askBtn" onclick="ask()">Ask</button>
    </div>
  </div>
  <div id="hint">Press Enter · Click Ask · or use Voice</div>
</div>

<!-- ═══ 3D SCENE — Siri-Style Morph Orb ═══ -->
<script>
window.aiState='idle';
(function(){
  const canvas=document.getElementById('bg');
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  renderer.setClearColor(0,0);
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.5;
  const scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x04060f,0.010);
  const camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,0.1,200);
  camera.position.set(0,0,24);
  scene.add(new THREE.AmbientLight(0xffffff,0.06));
  const ptB=new THREE.PointLight(0x4facfe,5,60); ptB.position.set(10,8,8); scene.add(ptB);
  const ptL=new THREE.PointLight(0xb9ff66,4,55); ptL.position.set(-10,-6,7); scene.add(ptL);
  const ptP=new THREE.PointLight(0xa78bfa,3,50); ptP.position.set(0,10,-6); scene.add(ptP);

  const VS=`
    uniform float uTime; uniform float uAmp;
    varying vec3 vN; varying float vDisp;
    void main(){
      vec3 p=position;
      float d=sin(p.x*3.2+uTime*1.1)*cos(p.y*2.9+uTime*.85)*sin(p.z*2.6+uTime*1.3);
      d+=sin(p.x*6.1-uTime*.65)*cos(p.y*5.2+uTime*1.35)*.38;
      d+=sin(p.x*1.4+uTime*.38)*sin(p.y*2.1-uTime*.55)*cos(p.z*1.9+uTime*.78)*.55;
      d+=cos(p.x*9.0-uTime*1.8)*sin(p.y*8.5+uTime*2.1)*.15;
      vDisp=d; vN=normalize(normal);
      gl_Position=projectionMatrix*modelViewMatrix*vec4(position+normal*d*uAmp,1.0);
    }`;
  const FS=`
    uniform vec3 uCA,uCB; uniform float uOp;
    varying vec3 vN; varying float vDisp;
    void main(){
      float rim=pow(1.0-abs(dot(vN,vec3(0,0,1))),1.7);
      float t=clamp((vDisp+1.0)*.5,0.0,1.0);
      vec3 col=mix(uCA,uCB,t+rim*.55);
      gl_FragColor=vec4(col*(.45+rim*.85+t*.3),uOp*(.5+rim*.5));
    }`;
  const FSi=`
    uniform vec3 uCA,uCB; uniform float uOp;
    varying vec3 vN; varying float vDisp;
    void main(){
      float rim=pow(1.0-abs(dot(vN,vec3(0,0,1))),1.3);
      float t=clamp((vDisp+1.0)*.5,0.0,1.0);
      vec3 col=mix(uCA,uCB,t*.7+rim*.3);
      gl_FragColor=vec4(col*(.7+rim*.9+t*.25),uOp*(.45+rim*.55));
    }`;

  function mkU(ca,cb,op){return{uTime:{value:0},uAmp:{value:.38},uCA:{value:new THREE.Color(ca)},uCB:{value:new THREE.Color(cb)},uOp:{value:op}};}
  const uO=mkU(0xb9ff66,0x4facfe,.82);
  const orb=new THREE.Mesh(new THREE.SphereGeometry(4.2,96,96),new THREE.ShaderMaterial({vertexShader:VS,fragmentShader:FS,uniforms:uO,transparent:true,depthWrite:false}));
  scene.add(orb);
  const uI=mkU(0xffffff,0xb9ff66,.55);
  const iOrb=new THREE.Mesh(new THREE.SphereGeometry(3.1,64,64),new THREE.ShaderMaterial({vertexShader:VS,fragmentShader:FSi,uniforms:uI,transparent:true,depthWrite:false}));
  scene.add(iOrb);
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(7,32,32),new THREE.MeshBasicMaterial({color:0x4facfe,transparent:true,opacity:.025,side:THREE.BackSide})));
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(10,32,32),new THREE.MeshBasicMaterial({color:0xb9ff66,transparent:true,opacity:.012,side:THREE.BackSide})));

  const NRINGS=10,wR=[];
  for(let i=0;i<NRINGS;i++){
    const m=new THREE.MeshBasicMaterial({color:0xb9ff66,transparent:true,opacity:0,depthWrite:false});
    const mesh=new THREE.Mesh(new THREE.TorusGeometry(1,.018,8,120),m);
    mesh.userData.phase=i/NRINGS; scene.add(mesh); wR.push(mesh);
  }

  function mkP(n,r0,r1,col,sz,op){
    const pos=new Float32Array(n*3);
    for(let i=0;i<n;i++){const r=r0+Math.random()*(r1-r0),th=Math.random()*Math.PI*2,ph=Math.acos((Math.random()-.5)*2);pos[i*3]=r*Math.sin(ph)*Math.cos(th);pos[i*3+1]=r*Math.sin(ph)*Math.sin(th);pos[i*3+2]=r*Math.cos(ph);}
    const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));
    return new THREE.Points(g,new THREE.PointsMaterial({color:col,size:sz,transparent:true,opacity:op,sizeAttenuation:true}));
  }
  const p1=mkP(700,12,30,0x4facfe,.065,.4),p2=mkP(350,8,45,0xa78bfa,.045,.22),p3=mkP(200,5,12,0xb9ff66,.05,.18);
  scene.add(p1);scene.add(p2);scene.add(p3);

  let mx=0,my=0,tmx=0,tmy=0;
  document.addEventListener('mousemove',e=>{tmx=(e.clientX/innerWidth-.5)*2;tmy=(e.clientY/innerHeight-.5)*2});
  window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});

  let curAmp=.38,curSpd=1,wTimer=0,t=0;
  const tC1=new THREE.Color(0xb9ff66),tC2=new THREE.Color(0x4facfe);
  (function loop(){
    requestAnimationFrame(loop);
    const st=window.aiState||'idle';
    let ta,ts,wc1=0xb9ff66,wc2=0x4facfe,wOn=false;
    if(st==='speaking'){ta=.90;ts=3.5;wOn=true;wc1=0xb9ff66;wc2=0x00ffaa;}
    else if(st==='thinking'){ta=.68;ts=2.5;wc1=0x4facfe;wc2=0xa78bfa;}
    else{ta=.38;ts=1.4;}
    tC1.set(wc1);tC2.set(wc2);
    curAmp+=(ta-curAmp)*.038; curSpd+=(ts-curSpd)*.038;
    t+=.008*curSpd;
    uO.uTime.value=t; uO.uAmp.value=curAmp;
    uO.uCA.value.lerp(tC1,.03); uO.uCB.value.lerp(tC2,.03);
    uI.uTime.value=t*1.15; uI.uAmp.value=curAmp*.6;
    uI.uCA.value.lerp(new THREE.Color(0xffffff),.02); uI.uCB.value.lerp(tC1,.03);
    orb.rotation.y=t*.07; orb.rotation.x=t*.035;
    iOrb.rotation.y=-t*.055; iOrb.rotation.x=-t*.028;
    wTimer+=.016;
    wR.forEach(r=>{
      if(wOn){const p=((wTimer*.55+r.userData.phase)%1);r.scale.setScalar(4.2+p*13);r.material.opacity=(1-p)*(.28+curAmp*.18);r.material.color.set(wc1);r.rotation.x=Math.sin(r.userData.phase*6+t*.3)*.5;r.rotation.y=Math.cos(r.userData.phase*5+t*.2)*.4;}
      else{r.material.opacity*=.93;}
    });
    ptB.position.x=Math.cos(t*.7)*14; ptB.position.z=Math.sin(t*.5)*10;
    ptL.position.x=Math.cos(t*.6+Math.PI)*12; ptL.position.y=Math.sin(t*.45)*8;
    ptB.intensity=4+curAmp*4; ptL.intensity=3+curAmp*3;
    p1.rotation.y=t*.022; p1.rotation.x=t*.007;
    p2.rotation.y=-t*.015; p2.rotation.z=t*.01;
    mx+=(tmx-mx)*.04; my+=(tmy-my)*.04;
    camera.position.x+=(mx*4.5-camera.position.x)*.03;
    camera.position.y+=(-my*3.5-camera.position.y)*.03;
    camera.lookAt(0,0,0);
    renderer.render(scene,camera);
  })();
})();
</script>

<!-- ═══ APP LOGIC ═══ -->
<script>
const isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>0;
const dot=document.getElementById('cursor'),ring=document.getElementById('cursor-ring');
if(!isTouch){
  let dx=0,dy=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{dx=e.clientX;dy=e.clientY});
  (function loop(){requestAnimationFrame(loop);rx+=(dx-rx)*.10;ry+=(dy-ry)*.10;dot.style.left=dx+'px';dot.style.top=dy+'px';ring.style.left=rx+'px';ring.style.top=ry+'px';})();
  document.querySelectorAll('button,input,select').forEach(el=>{
    el.addEventListener('mouseenter',()=>{dot.classList.add('hover');ring.classList.add('hover')});
    el.addEventListener('mouseleave',()=>{dot.classList.remove('hover');ring.classList.remove('hover')});
  });
}

const API='';
let currentLang='en', lastAnswer='';
let chatMessages=[];

// ── Theme toggle ──
function toggleTheme(){
  const h=document.documentElement;
  const isDark=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',isDark?'light':'dark');
  const btn=document.getElementById('themeBtn');
  btn.textContent=isDark?'🌙 Dark':'☀️ Light';
  localStorage.setItem('hq-theme',isDark?'light':'dark');
}
(function(){
  const saved=localStorage.getItem('hq-theme')||'dark';
  document.documentElement.setAttribute('data-theme',saved);
  const btn=document.getElementById('themeBtn');
  if(btn) btn.textContent=saved==='light'?'☀️ Light':'🌙 Dark';
})();

function setAIState(s){
  window.aiState=s;
  const lbl=document.getElementById('state-label');
  document.getElementById('state-text').textContent=s==='thinking'?'Thinking…':s==='speaking'?'Speaking':'Idle';
  lbl.className=s==='idle'?'':s;
}

function showAnswer(text,source){
  lastAnswer=text;
  const card=document.getElementById('answer-card');
  const el=document.getElementById('answer-text');
  document.getElementById('src-tag').textContent=source==='ai'?'Groq AI · LLaMA 3 70B':source==='wikipedia'?'Wikipedia · Health Article':'HealthQ · Database';
  document.getElementById('idle-hint').style.opacity='0';
  card.classList.remove('visible');
  el.textContent='';
  void card.offsetWidth; // reflow
  card.classList.add('visible');
  typewriterInto(el,text,()=>setTimeout(()=>doSpeak(text),200));
}

function hideAnswer(){
  document.getElementById('answer-card').classList.remove('visible');
  document.getElementById('idle-hint').style.opacity='1';
}

function typewriterInto(el,text,onDone){
  el.textContent='';let i=0;
  function tick(){if(i<text.length){el.textContent+=text[i++];setTimeout(tick,13)}else if(onDone)onDone();}
  tick();
}

const speakBtn=document.getElementById('speakBtn');
function doSpeak(text){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=currentLang==='hi'?'hi-IN':'en-IN';
  u.rate=.92;u.pitch=1;
  u.onstart=()=>{speakBtn.classList.add('on');setAIState('speaking')};
  u.onend=()=>{speakBtn.classList.remove('on');setAIState('idle')};
  u.onerror=()=>{speakBtn.classList.remove('on');setAIState('idle')};
  speechSynthesis.speak(u);
}
function toggleSpeak(){
  if(speechSynthesis.speaking){speechSynthesis.cancel();speakBtn.classList.remove('on');setAIState('idle');}
  else if(lastAnswer){doSpeak(lastAnswer);}
}

function onLangChange(){
  currentLang=document.getElementById('langSelect').value;
  if(rec) rec.lang=currentLang==='hi'?'hi-IN':'en-IN';
  const qi=document.getElementById('qi'),hint=document.getElementById('hint');
  if(currentLang==='hi'){
    qi.placeholder='कोई भी स्वास्थ्य प्रश्न पूछें…';
    hint.textContent='Enter दबाएं · Ask करें · या Voice उपयोग करें';
    document.getElementById('askBtn').textContent='पूछें';
    document.getElementById('idle-hint').textContent='अपने स्वास्थ्य के बारे में कुछ भी पूछें';
  } else {
    qi.placeholder='Ask a health question…';
    hint.textContent='Press Enter · Click Ask · or use Voice';
    document.getElementById('askBtn').textContent='Ask';
    document.getElementById('idle-hint').textContent='Ask me anything about your health';
  }
}
document.getElementById('qi').addEventListener('keydown',e=>{if(e.key==='Enter')ask()});

const vBtn=document.getElementById('voiceBtn'),hintEl=document.getElementById('hint');
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let rec=null,listening=false;
if(SR){
  rec=new SR();rec.lang='en-IN';rec.interimResults=true;
  rec.onstart=()=>{listening=true;vBtn.classList.add('listening');vBtn.textContent='🔴';hintEl.textContent='🎤 Listening...';hintEl.classList.add('red')};
  rec.onresult=e=>{const txt=Array.from(e.results).map(r=>r[0].transcript).join('');document.getElementById('qi').value=txt;if(e.results[0].isFinal){hintEl.textContent='Got it!';setTimeout(ask,400)}};
  rec.onerror=()=>{hintEl.textContent='Could not hear. Try again!';stopVoice()};
  rec.onend=stopVoice;
  vBtn.addEventListener('click',()=>listening?rec.stop():rec.start());
} else {
  vBtn.addEventListener('click',()=>{hintEl.textContent='Use Chrome or Edge for voice!';hintEl.classList.add('red');setTimeout(()=>hintEl.classList.remove('red'),3000)});
}
function stopVoice(){
  listening=false;vBtn.classList.remove('listening');vBtn.textContent='🎤';hintEl.classList.remove('red');
  setTimeout(()=>{hintEl.textContent=currentLang==='hi'?'Enter दबाएं · Ask करें · या Voice उपयोग करें':'Press Enter · Click Ask · or use Voice'},2500);
}

async function ask(){
  const inp=document.getElementById('qi');
  const question=inp.value.trim();
  if(!question) return inp.focus();
  inp.value='';
  speechSynthesis.cancel();
  speakBtn.classList.remove('on');
  setAIState('thinking');
  hideAnswer();
  const btn=document.getElementById('askBtn');
  btn.disabled=true;btn.textContent='…';
  try{
    chatMessages.push({role:'user',content:question});
    if(chatMessages.length>12) chatMessages=chatMessages.slice(-12);
    const res=await fetch(`${API}/api/ask`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question,messages:chatMessages,language:currentLang})});
    const data=await res.json();
    setAIState('idle');
    if(data.success){
      chatMessages.push({role:'assistant',content:data.answer});
      showAnswer(data.answer,data.source);
    }
    else{showAnswer(data.error||'Something went wrong. Please try again.','error');}
  } catch(e){
    setAIState('idle');
    showAnswer('Cannot reach server. Make sure it is running: node server.js','error');
  }
  btn.disabled=false;btn.textContent=currentLang==='hi'?'पूछें':'Ask';
}
</script>
